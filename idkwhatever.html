<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>實習幹部 級職與姓名測驗</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #e67e22;
            --success-color: #27ae60;
            --error-color: #c0392b;
            --bg-color: #f4f6f7;
        }

        body {
            font-family: "Microsoft JhengHei", "Heiti TC", sans-serif;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            color: #333;
        }

        .container {
            background: white;
            padding: 2.5rem;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            width: 90%;
            max-width: 600px;
            text-align: center;
        }

        h1 {
            color: var(--primary-color);
            margin-bottom: 0.5rem;
            font-size: 1.8rem;
            border-bottom: 2px solid #ecf0f1;
            padding-bottom: 1rem;
        }

        .question-box {
            background-color: #fef9e7;
            border: 2px solid #fad7a1;
            border-radius: 10px;
            padding: 2rem 1.5rem;
            margin: 1.5rem 0;
            font-size: 1.3rem;
            font-weight: bold;
            color: #333;
            line-height: 1.5;
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            white-space: pre-line;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 1.5rem;
        }

        .option-btn {
            background-color: white;
            border: 2px solid var(--primary-color);
            color: var(--primary-color);
            padding: 15px 10px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }

        .option-btn:hover {
            background-color: var(--primary-color);
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .option-btn:disabled {
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .option-btn.correct {
            background-color: var(--success-color);
            border-color: var(--success-color);
            color: white;
        }

        .option-btn.wrong {
            background-color: var(--error-color);
            border-color: var(--error-color);
            color: white;
            opacity: 0.8;
        }

        #result-area {
            min-height: 40px;
            margin-top: 1rem;
            font-size: 1.3rem;
            font-weight: bold;
        }

        .next-btn {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 12px 35px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            display: none;
            margin: 15px auto 0;
            font-family: inherit;
            box-shadow: 0 4px 15px rgba(230, 126, 34, 0.3);
        }

        .next-btn:hover {
            background-color: #d35400;
        }

        .stats {
            margin-top: 25px;
            font-size: 1rem;
            color: #7f8c8d;
            background: #ecf0f1;
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
        }

        @media (max-width: 480px) {
            .options-grid {
                grid-template-columns: 1fr; /* 手機版改為單行排列 */
            }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>幹部級職與姓名測驗</h1>
    
    <div class="question-box" id="question-text">
        題目載入中...
    </div>

    <div class="options-grid" id="options-container">
        </div>

    <div id="result-area"></div>
    <button class="next-btn" id="next-btn" onclick="generateQuestion()">下一題</button>
    
    <div class="stats">
        連續答對: <span id="streak" style="font-weight: bold; color: var(--primary-color);">0</span> 題
    </div>
</div>

<script>
    // 完整資料建檔
    const rosterData = [
        // 實習旅部
        { unit: "實習旅部", role: "實習旅長", name: "李晉安" },
        { unit: "實習旅部", role: "實習副旅長", name: "呂昱緯" },
        { unit: "實習旅部", role: "實習旅政戰主任", name: "吳佳穎" },
        { unit: "實習旅部", role: "實習旅參謀主任", name: "賀義翔" },
        { unit: "實習旅部", role: "實習旅人事官", name: "曾禹程" },
        { unit: "實習旅部", role: "實習旅訓練官", name: "陸試恩" },
        { unit: "實習旅部", role: "實習旅作戰官", name: "劉曄" },
        { unit: "實習旅部", role: "實習旅後勤官", name: "李興寶" },
        { unit: "實習旅部", role: "實習旅政戰官", name: "黃民宇" },
        { unit: "實習旅部", role: "實習旅通信官", name: "葉修辰" },
        { unit: "實習旅部", role: "實習旅經補官", name: "廖奕誠" },
        { unit: "實習旅部", role: "實習旅士官督導長", name: "陳宥均" },
        // 學一營
        { unit: "學一營", role: "實習營長", name: "劉昱宏" },
        { unit: "學一營", role: "實習副營長", name: "王黌鈞" },
        { unit: "學一營", role: "實習營輔導長", name: "潘富友" },
        { unit: "學一營", role: "實習營參謀主任", name: "褚昱宗" },
        { unit: "學一營", role: "實習營人事官", name: "胡家瑋" },
        { unit: "學一營", role: "實習營訓練官", name: "潘成翰" },
        { unit: "學一營", role: "實習營後勤官", name: "吳詠丞" },
        { unit: "學一營", role: "實習營政戰官", name: "蔡政安" },
        { unit: "學一營", role: "實習營通訊官", name: "林捷森" },
        { unit: "學一營", role: "實習營兵工官", name: "蘇昱達" },
        { unit: "學一營", role: "實習營士官督導長", name: "詹逸洲" },
        // 學二營
        { unit: "學二營", role: "實習營長", name: "吳秉傑" },
        { unit: "學二營", role: "實習副營長", name: "姜斌" },
        { unit: "學二營", role: "實習營輔導長", name: "朱侯樂" },
        { unit: "學二營", role: "實習營參謀主任", name: "李亮寬" },
        { unit: "學二營", role: "實習營人事官", name: "李恆誌" },
        { unit: "學二營", role: "實習營訓練官", name: "傅印辰" },
        { unit: "學二營", role: "實習營後勤官", name: "鄭哲旻" },
        { unit: "學二營", role: "實習營政戰官", name: "徐鼎凱" },
        { unit: "學二營", role: "實習營通訊官", name: "陳育均" },
        { unit: "學二營", role: "實習營兵工官", name: "陳惠謙" },
        { unit: "學二營", role: "實習營士官督導長", name: "陳豪毅" },
        // 學三營
        { unit: "學三營", role: "實習營長", name: "張家瑜" },
        { unit: "學三營", role: "實習副營長", name: "林旻欣" },
        { unit: "學三營", role: "實習營輔導長", name: "邱姵慈" },
        { unit: "學三營", role: "實習營參謀主任", name: "陳俊良" },
        { unit: "學三營", role: "實習營人事官", name: "陳業翎" },
        { unit: "學三營", role: "實習營訓練官", name: "周仕傑" },
        { unit: "學三營", role: "實習營後勤官", name: "陳奕翔" },
        { unit: "學三營", role: "實習營政戰官", name: "王晏以" },
        { unit: "學三營", role: "實習營通訊官", name: "吳茗軒" },
        { unit: "學三營", role: "實習營兵工官", name: "王建榮" },
        { unit: "學三營", role: "實習營士官督導長", name: "胡沁櫰" }
    ];

    // 取得所有不重複的名字和級職 (用於產生干擾選項)
    const allNames = [...new Set(rosterData.map(item => item.name))];
    const allRoles = [...new Set(rosterData.map(item => item.role))];

    let currentAnswer = "";
    let isAnswered = false;
    let streak = 0;

    // 洗牌函數
    function shuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    // 取得干擾選項 (錯的答案)
    function getDistractors(correct, sourceArray, count) {
        let filtered = sourceArray.filter(item => item !== correct);
        shuffleArray(filtered);
        return filtered.slice(0, count);
    }

    // 產生題目
    function generateQuestion() {
        isAnswered = false;
        document.getElementById('result-area').textContent = '';
        document.getElementById('next-btn').style.display = 'none';
        
        // 隨機抽取一個目標對象
        const target = rosterData[Math.floor(Math.random() * rosterData.length)];
        
        // 隨機決定題型 (0~3)
        const questionType = Math.floor(Math.random() * 4);
        
        let questionText = "";
        let options = [];

        if (questionType === 0) {
            // 題型 1: 問名字
            questionText = `【${target.unit}】\n${target.role} 是誰？`;
            currentAnswer = target.name;
            options = [currentAnswer, ...getDistractors(currentAnswer, allNames, 3)];
        } else if (questionType === 1) {
            // 題型 2: 問級職
            questionText = `【${target.unit}】\n${target.name} 的級職是？`;
            currentAnswer = target.role;
            options = [currentAnswer, ...getDistractors(currentAnswer, allRoles, 3)];
        } else if (questionType === 2) {
            // 題型 3: 克漏字 - 填名字
            questionText = `【${target.unit}】 克漏字：\n${target.role}：「____」`;
            currentAnswer = target.name;
            options = [currentAnswer, ...getDistractors(currentAnswer, allNames, 3)];
        } else {
            // 題型 4: 克漏字 - 填級職
            questionText = `【${target.unit}】 克漏字：\n「____」：${target.name}`;
            currentAnswer = target.role;
            options = [currentAnswer, ...getDistractors(currentAnswer, allRoles, 3)];
        }

        document.getElementById('question-text').textContent = questionText;

        // 打亂 4 個選項並渲染
        shuffleArray(options);
        renderOptions(options);
    }

    // 渲染選項按鈕
    function renderOptions(options) {
        const container = document.getElementById('options-container');
        container.innerHTML = ''; // 清空舊選項

        options.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.textContent = opt;
            btn.dataset.value = opt; // 儲存真實值
            btn.onclick = () => checkAnswer(opt, btn);
            container.appendChild(btn);
        });
    }

    // 檢查答案
    function checkAnswer(selectedOption, btnElement) {
        if (isAnswered) return;
        isAnswered = true;

        const resultArea = document.getElementById('result-area');
        const allButtons = document.querySelectorAll('.option-btn');

        if (selectedOption === currentAnswer) {
            // 答對
            btnElement.classList.add('correct');
            resultArea.textContent = '✅ 答對了！';
            resultArea.style.color = 'var(--success-color)';
            streak++;
        } else {
            // 答錯
            btnElement.classList.add('wrong');
            resultArea.textContent = `❌ 答錯了。正確答案是：${currentAnswer}`;
            resultArea.style.color = 'var(--error-color)';
            streak = 0;
            
            // 找出並標示正確答案
            allButtons.forEach(btn => {
                if (btn.dataset.value === currentAnswer) {
                    btn.classList.add('correct');
                }
            });
        }

        document.getElementById('streak').textContent = streak;
        document.getElementById('next-btn').style.display = 'block';

        // 鎖定所有按鈕
        allButtons.forEach(btn => btn.disabled = true);
    }

    // 啟動第一題
    generateQuestion();

</script>

</body>
</html>
